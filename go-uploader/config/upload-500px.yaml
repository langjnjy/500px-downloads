# 500px-downloads：扁平扫描 output/media → 腾讯云 COS（~/.aws/credentials 中 [tencent-cos]）
# 对象键：nobodies-ai-data/500px-downloads/media/<相对 scan_root 的路径>
# 等价 s3 URI：s3://nobodies-ai-data-de-1431379479/nobodies-ai-data/500px-downloads/media/
#
# 本批成功上传后，将 output/metadata/*.metadata.jsonl 中 basename 匹配的行的 image_key 重写为 metadata_image_key_prefix/basename。
#
# 常驻 loop=true；until_empty 在 loop=true 时不会单独走 until-empty 分支（与 pexels 配置习惯一致）。

output_dir: "../output"
downloads_dir: "downloads"
pipeline_root_dir: "pipeline"
metadata_dir: "../output/metadata"

metadata_image_key_prefix: "nobodies-ai-data/500px-downloads/media"

wasabi:
  enabled: true
  profile: "tencent-cos"
  bucket: "nobodies-ai-data-de-1431379479"
  region_name: "eu-frankfurt"
  endpoint_url: "https://cos.eu-frankfurt.myqcloud.com"
  # 地域 endpoint 使用虚拟托管；若改自定义域名可显式设为 true
  # s3_path_style: false
  key_prefix: "nobodies-ai-data/500px-downloads/media"

  upload_workers: 80
  max_queue_size: 640
  max_pool_connections: 80

  delete_after_upload: true

  upload_retries: 3
  upload_retry_base_sec: 0.5
  upload_retry_max_sec: 60
  sdk_connect_timeout_sec: 60
  sdk_read_timeout_sec: 300

upload:
  dry_run: false
  scan_root: "/home/ubuntu/500px-downloads/output/media"
  discover_categories: false
  loop: true
  until_empty: true
  poll_seconds: 600
  idle_poll_seconds: 600
  report_seconds: 60
