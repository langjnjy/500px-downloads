# 500px：从 extract metadata JSONL 下载到 output/media（HTTP + 代理，无 S3，不写 metadata）。
#
# 在仓库根执行：
#   go build -o go-downloader/download ./go-downloader/cmd/download
#   ./go-downloader/download -config go-downloader/config/download-500px.yaml
#
# 输入（二选一）：
#   1. 配置 extract_metadata_path_template → 仅下载该文件
#   2. 不配置 → 自动扫描 output/metadata/extract_metadata_<n>.jsonl，多个按 n 升序依次下载
# 输出：仅图片文件到 media / media_upscale；不写 {date}.metadata.jsonl。
# 分辨率满足「最短边>=1080 且 长边>=2000」→ 直存 media；否则 media_upscale → OpenCV cubic 2x → media。
# seen.db 仅记录下载状态（ok/failed）；ok 表示已成功下载过（本地 media 上传 S3 后删除亦视为 ok，不重复下载）。
# retry_failed: true 时从 seen.db 的 failed 记录重试；无 failed 时回退 failed_urls 文件。
# checkpoint：每处理完 checkpoint_interval_lines 行（含 skipped）写入 output/checkpoints/500px_download.ckpt。
#
# download.retries：失败后的「额外重试」次数；retries: 3 表示最多共 4 次 HTTP 尝试。

project_root: ".."
image_key_prefix: "500px-downloads/media"
image_key_style: "crawl_hash"

input_mode: "extract_metadata"
# extract_metadata_path_template: "output/metadata/extract_metadata_1.jsonl"
media_upscale_dir_template: "output/media_upscale"
resolution_min_short: 1080
resolution_min_long: 2000
# 以下为可选。省略时：内置 CGO+OpenCV 放大；upscale_workers 默认 4。
# upscale_python / upscale_script 已弃用（保留字段仅为兼容旧 yaml）。
upscale_workers: 8

include_categories:
  - 500px
exclude_categories: []

urls_path_template: "output/urls/extract_urls_1"
urls_delta_dir_template: "output/urls/delta"
pipeline_root: "output"

media_dir_template: "output/media"
metadata_daily_path_template: "output/metadata/{date}.metadata.jsonl"
metadata_glob_path_template: "output/metadata/glob/metadata.jsonl"

metadata_bloom_enable: true
metadata_bloom_bits: 7200000000
metadata_bloom_hashes: 10
metadata_bloom_flush_sec: 60
metadata_bloom_path_template: "output/metadata/seen/500px.metadata.bloom"

metadata_seen_db_enable: true
metadata_seen_db_path_template: "output/metadata/seen/500px_seen.db"

download:
  workers: 40
  retries: 3
  timeout_sec: 120
  skip_suffixes: [".m3u8", ".mp4"]
  use_user_agents: true
  http_user_agent: ""
  http_pool_maxsize: 200
  use_proxy: true
  proxies_yaml: "config/proxies.yaml"
  progress_interval_sec: 600
  disk_glob_fallback: true
  metadata_flush_every: 5000
  metadata_flush_interval_sec: 15
  loop: false
  loop_idle_poll_seconds: 600
  retry_failed: true
  checkpoint_interval_lines: 5000
  checkpoint_path_template: "output/checkpoints/500px_download.ckpt"
  failed_urls_path_template: "output/failed/500px_failed_urls.txt"
