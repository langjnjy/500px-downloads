# 500px photographers 页 userSearch 分桶抓取（在此文件编辑 runs）
#
# 说明：
# - 网页上「Specialty」「Membership」等文案对应 GraphQL 的 key：SPECIALTIES、MEMBER_TYPE 等。
# - value 必须是站点内部 ID（字符串数字）。用英文类别名会触发搜索 500。
# - 下表 totalCount 为某次 API 探测值，会随时间变化；ID 与 UI 标签请以 DevTools 为准。
#
# 完整 ID 与 totalCount：config/500px_usersearch_filter_ids.yaml
#
# 策略：每行 run 从第 1 页拉满该桶；多桶并集后 awk '!seen[$0]++' 或 sort -u 去重。

runs:
  - name: specialty_18_small
    filters:
      - key: SPECIALTIES
        value: "18"

  - name: specialty_9
    filters:
      - key: SPECIALTIES
        value: "9"

  - name: specialty_1_plus_member_8
    filters:
      - key: SPECIALTIES
        value: "1"
      - key: MEMBER_TYPE
        value: "8"

  # 取消注释以跑满 1–18（耗时长；大桶仍可能触发深分页 500）
  # - name: specialty_01
  #   filters: [{ key: SPECIALTIES, value: "1" }]
  # - name: specialty_02
  #   filters: [{ key: SPECIALTIES, value: "2" }]
